<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEG MUSIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="logo">MEG MUSIC</span>
      <span class="logo-tag">// PLAYER v1.0</span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text" id="statusText">IDLE</span>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="main-layout">

    <!-- LEFT PANEL: SEARCH + RESULTS -->
    <section class="panel panel-search">
      <div class="panel-label">SEARCH</div>

      <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="TRACK / ARTIST / ALBUM..."
          autocomplete="off"
        />
        <button class="search-btn" id="searchBtn">RUN</button>
      </div>

      <div class="results-header" id="resultsHeader" style="display:none;">
        <span id="resultsCount">0 RESULTS</span>
        <span class="results-tag">// SPOTIFY</span>
      </div>

      <div class="results-list" id="resultsList">
        <div class="empty-state">
          <div class="empty-icon">◈</div>
          <p>SEARCH TO DISCOVER TRACKS</p>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL: PLAYLIST -->
    <section class="panel panel-playlist">
      <div class="panel-label">
        PLAYLIST
        <span class="playlist-count" id="playlistCount">[ 0 ]</span>
      </div>

      <div class="playlist-actions">
        <button class="action-btn" id="clearPlaylistBtn">CLEAR ALL</button>
      </div>

      <div class="playlist-list" id="playlistList">
        <div class="empty-state">
          <div class="empty-icon">◇</div>
          <p>NO TRACKS SAVED YET</p>
        </div>
      </div>
    </section>

  </main>

  <!-- PLAYER BAR (BOTTOM) -->
  <footer class="player-bar" id="playerBar">
    <div class="player-info">
      <div class="player-track" id="playerTrack">—</div>
      <div class="player-artist" id="playerArtist">SELECT A TRACK TO PLAY</div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous">&#9664;&#9664;</button>
        <button class="ctrl-btn ctrl-play" id="playPauseBtn" title="Play/Pause">
          <span id="playIcon">&#9654;</span>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Next">&#9654;&#9654;</button>
      </div>

      <div class="progress-wrapper">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <span class="vol-label">VOL</span>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" />
      <span class="vol-value" id="volValue">80</span>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer" preload="metadata"></audio>
  </footer>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
